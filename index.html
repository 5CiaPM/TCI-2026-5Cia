<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TCI 2026 — Acesso Restrito</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;600;700&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy:  #0a1628;
    --navy2: #0f1f3d;
    --gold:  #c8a84b;
    --gold2: #e8c96b;
    --muted: #8a9ab5;
    --white: #f5f7fa;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    width: 100%;
    height: 100%;
  }

  body {
    background: var(--navy);
    color: var(--white);
    font-family: 'Source Sans 3', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,.01) 40px,rgba(255,255,255,.01) 41px),
      repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,255,255,.01) 40px,rgba(255,255,255,.01) 41px);
    pointer-events:none; z-index:0;
  }

  @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes shake  { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-8px)} 40%,80%{transform:translateX(8px)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes popIn  { 0%{opacity:0;transform:scale(.8)} 60%{transform:scale(1.08)} 100%{opacity:1;transform:scale(1)} }

  /* =========================================================
     LOGIN
  ========================================================= */
  #login-screen {
    position: relative;
    z-index: 1;
    width: 100%;
    padding: 24px 20px 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeUp .5s ease;
    overflow-y: auto;
    min-height: 100vh;
    min-height: 100dvh;
    justify-content: center;
  }

  .login-inner {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .login-badge {
    width: 92px; height: 92px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Oswald', sans-serif;
    color: var(--navy);
    text-align: center;
    line-height: 1.3;
    margin-bottom: 20px;
    box-shadow: 0 0 48px rgba(200,168,75,.55), 0 0 0 6px rgba(200,168,75,.12);
    padding: 8px;
  }
  .lb1 { font-size: 9px; font-weight: 600; opacity: .75; }
  .lb2 { font-size: 17px; font-weight: 700; }
  .lb3 { font-size: 11px; font-weight: 600; }

  .login-title {
    font-family: 'Oswald', sans-serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 4px;
  }
  .login-title span { color: var(--gold); }

  .login-sub {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 28px;
  }

  .login-card {
    width: 100%;
    background: var(--navy2);
    border: 1px solid rgba(200,168,75,.25);
    border-radius: 14px;
    padding: 28px 22px;
    box-shadow: 0 24px 64px rgba(0,0,0,.6);
  }
  .login-card.shake { animation: shake .4s ease; }

  .fg { margin-bottom: 18px; }
  .fg label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 7px;
  }
  .fg input {
    width: 100%;
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: 8px;
    padding: 13px 16px;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 16px;
    color: var(--white);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    letter-spacing: 1px;
    -webkit-appearance: none;
    appearance: none;
  }
  .fg input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(200,168,75,.15);
  }
  .fg input::placeholder { color: rgba(255,255,255,.25); }

  .btn-primary {
    width: 100%;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border: none;
    border-radius: 8px;
    padding: 15px;
    font-family: 'Oswald', sans-serif;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--navy);
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    margin-top: 6px;
    -webkit-appearance: none;
  }
  .btn-primary:active { transform: scale(.97); opacity: .88; }

  .error-msg {
    background: rgba(178,34,34,.15);
    border: 1px solid rgba(178,34,34,.4);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 13px;
    color: #ff8080;
    text-align: center;
    margin-top: 14px;
    display: none;
  }
  .error-msg.show { display: block; }

  .footer-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 22px;
    text-align: center;
    opacity: .7;
  }

  /* =========================================================
     BOAS-VINDAS
  ========================================================= */
  #welcome-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--navy);
    z-index: 900;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    padding: 32px;
  }
  #welcome-overlay.show { display: flex; animation: fadeIn .35s ease; }

  .wc-badge {
    width: 100px; height: 100px;
    background: linear-gradient(135deg, var(--gold), var(--gold2));
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 46px;
    margin-bottom: 24px;
    animation: popIn .6s cubic-bezier(.34,1.56,.64,1) .1s both;
    box-shadow: 0 0 64px rgba(200,168,75,.55);
  }

  .wc-title {
    font-family: 'Oswald', sans-serif;
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
    animation: fadeUp .4s ease .25s both;
  }
  .wc-name {
    font-family: 'Oswald', sans-serif;
    font-size: 32px;
    font-weight: 700;
    color: var(--gold2);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 4px;
    animation: fadeUp .4s ease .35s both;
  }
  .wc-grad {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 36px;
    animation: fadeUp .4s ease .4s both;
  }
  .wc-bar-wrap {
    width: 220px; height: 4px;
    background: rgba(255,255,255,.08);
    border-radius: 99px;
    overflow: hidden;
    animation: fadeIn .3s ease .45s both;
  }
  .wc-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 99px;
    width: 0%;
    transition: width 1.9s linear;
  }
  .wc-info {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-top: 14px;
    animation: fadeIn .3s ease .5s both;
  }

  /* =========================================================
     IFRAME
  ========================================================= */
  #app-screen {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: #000;
  }
  #tci-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-inner">

    <div class="login-badge">
      <span class="lb1">2º BPM/I</span>
      <span class="lb2">5ª CIA</span>
      <span class="lb3">TCI 2026</span>
    </div>

    <div class="login-title">Painel <span>TCI</span></div>
    <div class="login-sub">2º BPM/I &middot; 5ª CIA &middot; Acesso Restrito</div>

    <div class="login-card" id="login-card">
      <div class="fg">
        <label>RE — Registro de Efetivo</label>
        <input type="text" id="inp-re"
               placeholder="Ex: 123456-0"
               autocomplete="off" autocorrect="off"
               autocapitalize="off" spellcheck="false">
      </div>
      <div class="fg">
        <label>Senha</label>
        <input type="password" id="inp-senha"
               placeholder="••••••••••"
               autocomplete="current-password">
      </div>
      <button class="btn-primary" onclick="fazerLogin()">&#128274; Entrar</button>
      <div class="error-msg" id="erro-msg">
        RE ou senha incorretos.<br>Verifique os dados e tente novamente.
      </div>
    </div>

    <div class="footer-label">Acesso exclusivo para instrutores TCI 2026</div>
  </div>
</div>

<!-- BOAS-VINDAS -->
<div id="welcome-overlay">
  <div class="wc-badge">&#11088;</div>
  <div class="wc-title">Bem-vindo ao sistema TCI 2026</div>
  <div class="wc-name" id="wc-nome"></div>
  <div class="wc-grad" id="wc-grad"></div>
  <div class="wc-bar-wrap"><div class="wc-bar-fill" id="wc-bar"></div></div>
  <div class="wc-info">Carregando painel&hellip;</div>
</div>

<!-- APP -->
<div id="app-screen">
  <iframe id="tci-frame" src="" allow="fullscreen; camera; microphone"></iframe>
</div>

<script>
/* ─── POLICIAIS AUTORIZADOS ─────────────────────── */
var POLICIAIS = [
  { re: '121876-0',  nome: 'JOSEMAR',         grad: 'CAP PM'    },
  { re: '117404-5',  nome: 'ARCANJO',          grad: '1º TEN PM' },
  { re: '117698-6',  nome: 'MARCOS',           grad: 'SUBTEN PM' },
  { re: '106459-2',  nome: 'CLEVERSON',        grad: 'SUBTEN PM' },
  { re: '103005-1',  nome: 'CARLOS HENRIQUE',  grad: 'SUBTEN PM' },
  { re: '105535-6',  nome: 'DANTAS',           grad: 'SUBTEN PM' },
  { re: '117660-9',  nome: 'ROCHA',            grad: 'SUBTEN PM' },
  { re: '102962-2',  nome: 'TEIXEIRA',         grad: 'SUBTEN PM' },
  { re: '125367-A',  nome: 'J. ALMEIDA',       grad: '1º SGT PM' },
  { re: '109201-4',  nome: 'LOCATELLI',        grad: '1º SGT PM' },
  { re: '119223-0',  nome: 'JHONNY',           grad: '1º SGT PM' },
  { re: '135976-2',  nome: 'WILLIANS',         grad: '2º SGT PM' },
  { re: '127433-3',  nome: 'RUBENS',           grad: 'CB PM'     },
];

var SENHA    = '5ciatci2026';
var URL_DEST = 'https://paineltci.vercel.app/';

/* ─── LOGIN ─────────────────────────────────────── */
function fazerLogin() {
  var re    = document.getElementById('inp-re').value.trim().replace(/\s/g,'').toUpperCase();
  var senha = document.getElementById('inp-senha').value;
  var card  = document.getElementById('login-card');
  var erro  = document.getElementById('erro-msg');

  var policial = null;
  for (var i = 0; i < POLICIAIS.length; i++) {
    if (POLICIAIS[i].re.replace(/\s/g,'').toUpperCase() === re) {
      policial = POLICIAIS[i];
      break;
    }
  }

  if (!policial || senha !== SENHA) {
    erro.classList.add('show');
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
    setTimeout(function(){ card.classList.remove('shake'); }, 450);
    return;
  }

  erro.classList.remove('show');
  exibirBoasVindas(policial);
}

/* ─── BOAS-VINDAS ───────────────────────────────── */
function exibirBoasVindas(pol) {
  document.getElementById('login-screen').style.display = 'none';

  document.getElementById('wc-nome').textContent = pol.nome;
  document.getElementById('wc-grad').textContent = pol.grad;

  var overlay = document.getElementById('welcome-overlay');
  overlay.classList.add('show');

  setTimeout(function(){
    document.getElementById('wc-bar').style.width = '100%';
  }, 60);

  setTimeout(function(){
    overlay.classList.remove('show');
    abrirPainel();
  }, 2300);
}

/* ─── PAINEL ────────────────────────────────────── */
function abrirPainel() {
  var app   = document.getElementById('app-screen');
  var frame = document.getElementById('tci-frame');
  frame.src = URL_DEST;
  app.style.display = 'block';
}

/* ─── ENTER ─────────────────────────────────────── */
document.addEventListener('keydown', function(e){
  if (e.key === 'Enter') fazerLogin();
});
</script>
</body>
</html>
